name: WCA Weekly Ingestion

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      DATABASE_DIRECT_URL: ${{ secrets.DATABASE_DIRECT_URL }}
      DATABASE_POOLER_URL: ${{ secrets.DATABASE_POOLER_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Apply schema
        run: pnpm db:push

      - name: Ingest latest weekly export
        run: pnpm cron:wca-once
